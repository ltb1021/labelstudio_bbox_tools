# RTX4090 server example template.
# 실제 dataset/export 경로는 사용자 작업에 맞게 로컬에서 채운다.
# token은 YAML에 저장하지 말고 .env에 둔다.

label_studio:
  url: "http://YOUR_RTX4090_SERVER_IP:9225"
  doc_root: "/path/to/label_studio_data"

smoke_test:
  sample_image_dir: "/path/to/sample/images"
  sample_mmyolo_json: "/path/to/annotations_mmyolo.json"
  temp_output_dir: "/path/to/temp/export/output"
